    <!-- SEO Meta Tags -->
    <meta name="title" content="Alfietz - African Heritage Crafts Marketplace" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://alfietz.vercel.app/" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Alfietz",
      "url": "https://alfietz.vercel.app/",
      "description": "Marketplace for African heritage crafts and bespoke fashion.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://alfietz.vercel.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
